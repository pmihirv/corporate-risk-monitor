<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Enterprise Insolvency Risk Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
    <header class="border-b border-slate-800 bg-slate-900/50 p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-cyan-400">Insolvency Risk Monitor</h1>
        <div class="text-xs text-slate-400 bg-slate-800 px-3 py-1 rounded-full">v4.0 Live Engine</div>
    </header>
    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <section class="lg:col-span-5 bg-slate-800/40 border border-slate-700 p-6 rounded-2xl">
            <div class="mb-4">
                <label class="block text-xs font-semibold text-cyan-400 mb-2">Yahoo Finance Ticker Search</label>
                <div class="flex space-x-2">
                    <input type="text" id="tickerInput" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 uppercase font-mono" placeholder="e.g. NVDA, AAPL">
                    <button onclick="fetchTickerRatios()" id="lookupBtn" class="bg-cyan-600 px-4 rounded-xl text-xs font-bold">Fetch</button>
                </div>
                <p id="tickerFeedback" class="text-[11px] text-slate-400 mt-1">Ready for search pass.</p>
            </div>
            <form onsubmit="evaluateRisk(event)" class="space-y-4">
                <div><label class="block text-xs text-slate-300">X1: Working Capital / TA</label><input type="number" step="0.0001" id="x1" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm"></div>
                <div><label class="block text-xs text-slate-300">X2: Retained Earnings / TA</label><input type="number" step="0.0001" id="x2" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm"></div>
                <div><label class="block text-xs text-slate-300">X3: EBITDA / TA</label><input type="number" step="0.0001" id="x3" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm"></div>
                <div><label class="block text-xs text-slate-300">X4: Market Cap / TL</label><input type="number" step="0.0001" id="x4" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm"></div>
                <div><label class="block text-xs text-slate-300">X5: Sales / TA</label><input type="number" step="0.0001" id="x5" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm"></div>
                <div><label class="block text-xs text-slate-300">Sentiment Score Proxy</label><input type="number" step="0.01" id="sentiment" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm"></div>
                <button type="submit" id="submitBtn" class="w-full bg-emerald-500 py-3 rounded-xl font-bold text-sm">Execute Evaluation</button>
            </form>
        </section>
        <section class="lg:col-span-7">
            <div id="placeholderView" class="border border-dashed border-slate-700 rounded-2xl p-12 text-center bg-slate-800/10">Awaiting Pipeline Execution Loop</div>
            <div id="resultsView" class="hidden bg-slate-800/20 border border-slate-700 p-6 rounded-2xl flex flex-col justify-between h-full">
                <div>
                    <h2 class="text-lg font-semibold mb-4">Risk Evaluation Summary</h2>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-slate-900 p-4 rounded-xl"><span class="text-[10px] text-slate-400 block">Z-SCORE</span><div id="zScoreOut" class="text-2xl font-bold">--</div></div>
                        <div class="bg-slate-900 p-4 rounded-xl"><span class="text-[10px] text-slate-400 block">RISK ZONE</span><div id="zoneBadge" class="text-sm font-bold mt-1">--</div></div>
                    </div>
                    <div class="bg-slate-900 p-4 rounded-xl mb-4">
                        <div class="flex justify-between text-xs mb-1"><span>ML Default Probability</span><span id="mlProb" class="font-bold text-cyan-400">0%</span></div>
                        <div class="w-full bg-slate-800 h-2 rounded-full"><div id="mlProgressBar" class="bg-cyan-400 h-2 rounded-full transition-all duration-300" style="width: 0%"></div></div>
                    </div>
                    <button onclick="downloadExecutivePDF()" class="w-full bg-slate-700 py-2.5 rounded-xl text-xs font-semibold border border-slate-600">📥 Download Visual Executive Risk Report (PDF)</button>
                </div>
            </div>
        </section>
    </main>
    <script>
        let lastEvaluationData = null, activeCompanyName = "Custom", activeTickerHistory = null;
        async function fetchTickerRatios() {
            const s = document.getElementById("tickerInput").value.trim();
            if(!s) return;
            document.getElementById("tickerFeedback").innerText = "⏳ Fetching from Yahoo Finance...";
            try {
                const r = await fetch("/api/ticker/" + s);
                if(!r.ok) throw new Error("Lookup failure.");
                const d = await r.json();
                document.getElementById("x1").value = d.x1; document.getElementById("x2").value = d.x2;
                document.getElementById("x3").value = d.x3; document.getElementById("x4").value = d.x4;
                document.getElementById("x5").value = d.x5; document.getElementById("sentiment").value = d.sentiment;
                activeCompanyName = d.company_name; activeTickerHistory = d.history;
                document.getElementById("tickerFeedback").innerHTML = "✅ Active target: <b class='text-cyan-400'>" + activeCompanyName + "</b>";
            } catch(e) { document.getElementById("tickerFeedback").innerText = "❌ Lookup error."; }
        }
        async function evaluateRisk(e) {
            e.preventDefault();
            const payload = {
                working_capital_ta: parseFloat(document.getElementById("x1").value),
                retained_earnings_ta: parseFloat(document.getElementById("x2").value),
                ebitda_ta: parseFloat(document.getElementById("x3").value),
                market_cap_tl: parseFloat(document.getElementById("x4").value),
                sales_ta: parseFloat(document.getElementById("x5").value),
                sentiment: parseFloat(document.getElementById("sentiment").value)
            };
            try {
                const r = await fetch("/predict", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
                const d = await r.json();
                document.getElementById("placeholderView").classList.add("hidden");
                document.getElementById("resultsView").classList.remove("hidden");
                document.getElementById("zScoreOut").innerText = d.altman_z_score;
                document.getElementById("mlProb").innerText = d.ml_risk_probability + "%";
                document.getElementById("mlProgressBar").style.width = d.ml_risk_probability + "%";
                document.getElementById("zoneBadge").innerText = d.financial_risk_zone;
                
                const tk = document.getElementById("tickerInput").value.trim().toUpperCase();
                lastEvaluationData = {
                    ticker_symbol: tk || "CUSTOM", company_name: tk ? activeCompanyName : "Custom",
                    altman_z_score: d.altman_z_score, financial_risk_zone: d.financial_risk_zone,
                    ml_risk_probability: d.ml_risk_probability, model_classification: d.model_classification,
                    x1: payload.working_capital_ta, x2: payload.retained_earnings_ta, x3: payload.ebitda_ta,
                    x4: payload.market_cap_tl, x5: payload.sales_ta, sentiment: payload.sentiment,
                    history: activeTickerHistory
                };
            } catch(err) { alert("Pipeline error."); }
        }
        async function downloadExecutivePDF() {
            if(!lastEvaluationData) return;
            try {
                const r = await fetch("/api/report/download", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(lastEvaluationData) });
                const blob = await r.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a"); a.href = url; a.download = "Risk_Report.pdf"; document.body.appendChild(a); a.click(); a.remove();
            } catch(e) { alert("PDF download failed."); }
        }
    </script>
</body>
</html>
